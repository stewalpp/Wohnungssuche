name: Weekly availability check

on:
  schedule:
    - cron: "0 19 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: wohnungssuche
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check previous listings
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_NOTIFICATION_USERS: stewalpp,gishaa-create
        run: |
          python -m wohnungssuche.availability \
            --config config/search.yml \
            --state data/seen_listings.json \
            --report reports/availability.md \
            --github-issue

      - name: Commit updated availability state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data reports docs/data
          if ! git diff --cached --quiet; then
            git commit -m "Update listing availability"
            git push
          else
            echo "No changes to commit."
          fi
