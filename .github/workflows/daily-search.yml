name: Apartment search

on:
  schedule:
    - cron: "30 5,10,16,18 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: wohnungssuche
  cancel-in-progress: false

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Search new listings
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_NOTIFICATION_USER: stewalpp
        run: |
          python -m wohnungssuche.search \
            --config config/search.yml \
            --state data/seen_listings.json \
            --report reports/latest.md \
            --github-issue

      - name: Commit updated state and reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data reports
          if ! git diff --cached --quiet; then
            git commit -m "Update apartment search results"
            git push
          else
            echo "No changes to commit."
          fi
