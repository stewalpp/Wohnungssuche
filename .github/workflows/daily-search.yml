name: Apartment search

on:
  schedule:
    - cron: "30 5,10,16,18 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/daily-search.yml"
      - "config/search.yml"
      - "requirements.txt"
      - "wohnungssuche/**"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: wohnungssuche
  cancel-in-progress: true

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Re-add when a render source is enabled (currently ImmoScout is off):
          #   python -m playwright install --with-deps chromium

      - name: Search new listings
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_NOTIFICATION_USERS: stewalpp,gishaa-create
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_STARTTLS: ${{ secrets.SMTP_STARTTLS }}
          SMS_TO_NUMBER: ${{ secrets.SMS_TO_NUMBER }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_CLICK: https://stewalpp.github.io/Wohnungssuche/
        run: |
          python -m wohnungssuche.search \
            --config config/search.yml \
            --state data/seen_listings.json \
            --report reports/latest.md \
            --github-issue

      - name: Commit updated state and reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data reports docs/data
          if ! git diff --cached --quiet; then
            git commit -m "Update apartment search results"
            git push
          else
            echo "No changes to commit."
          fi
